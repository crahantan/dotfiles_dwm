[font]
normal = { family = "Mononoki Nerd Font", style = "Regular" }
bold = { family = "Mononoki Nerd Font", style = "Bold" }
italic = { family = "Mononoki Nerd Font", style = "Italic" }
size = 20.0  

[window]
decorations = "full"
opacity = 1.0

[colors]

# Default colors
[colors.primary]
background = "#1d2021"
foreground = "#fdf6e3"

# Normal colors
[colors.normal]
black   = "#282828"
red     = "#cc241d"
green   = "#98971a"
yellow  = "#d79921"
blue    = "#458588"
magenta = "#b16286"
cyan    = "#689d6a"
white   = "#a89984"

# Bright colors
[colors.bright]
black   = "#928374"
red     = "#fb4934"
green   = "#b8bb26"
yellow  = "#fabd2f"
blue    = "#83a598"
magenta = "#d3869b"
cyan    = "#8ec07c"
white   = "#ebdbb2"

# Cursor colors
[colors.cursor]
text   = "#1d2021"
cursor = "#fdf6e3"

# Selection colors
[colors.selection]
text       = "#1d2021"
background = "#fdf6e3"

# Search colors
[colors.search]
[colors.search.matches]
foreground = "#1d2021"
background = "#fabd2f"

[colors.search.focused_match]
foreground = "#1d2021"
background = "#83a598"

# Hints colors
[colors.hints]
[colors.hints.start]
foreground = "#1d2021"
background = "#fabd2f"

[colors.hints.end]
foreground = "#1d2021"
background = "#83a598"

