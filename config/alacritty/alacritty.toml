[font]
normal = { family = "Mononoki Nerd Font", style = "Regular" }
bold = { family = "Mononoki Nerd Font", style = "Bold" }
italic = { family = "Mononoki Nerd Font", style = "Italic" }
size = 20.0

[window]
decorations = "none"
opacity = 1.0

[colors]
# GitHub Dark Default

# Default colors
[colors.primary]
background = "#0d1117"
foreground = "#c9d1d9"

# Normal colors
[colors.normal]
black   = "#484f58"
red     = "#ff7b72"
green   = "#3fb950"
yellow  = "#d29922"
blue    = "#58a6ff"
magenta = "#bc8cff"
cyan    = "#39c5cf"
white   = "#b1bac4"

# Bright colors
[colors.bright]
black   = "#6e7681"
red     = "#ffa198"
green   = "#56d364"
yellow  = "#e3b341"
blue    = "#79c0ff"
magenta = "#d2a8ff"
cyan    = "#56d4dd"
white   = "#f0f6fc"

# Cursor colors
[colors.cursor]
text   = "#0d1117"
cursor = "#c9d1d9"

# Selection colors
[colors.selection]
text       = "CellForeground"
background = "#264f78"

# Search colors
[colors.search]
[colors.search.matches]
foreground = "#0d1117"
background = "#e3b341"

[colors.search.focused_match]
foreground = "#0d1117"
background = "#58a6ff"

# Hints colors
[colors.hints]
[colors.hints.start]
foreground = "#0d1117"
background = "#e3b341"

[colors.hints.end]
foreground = "#0d1117"
background = "#58a6ff"
